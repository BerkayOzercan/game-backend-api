<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regal Rust — Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d18;
      --surface:  #16162a;
      --surface2: #1e1e36;
      --border:   #2e2e52;
      --gold:     #c9a227;
      --text:     #d4d4e8;
      --text-dim: #7a7a9a;
      --green:    #4caf7d;
      --red:      #e05555;
      --blue:     #5588e0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── AUTH SCREEN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 48px;
      width: 380px;
      text-align: center;
    }

    .login-card .crest { font-size: 48px; margin-bottom: 12px; }

    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .login-card p {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 20px;
    }

    .auth-tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      background: transparent;
      border: none;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .auth-tab.active { background: var(--gold); color: #0d0d18; }

    /* ── FORMS ── */
    .form-group { margin-bottom: 16px; text-align: left; }

    .form-group label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--gold); }

    .btn-primary {
      width: 100%;
      background: var(--gold);
      color: #0d0d18;
      border: none;
      border-radius: 6px;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #e0b72c; }

    #login-error {
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
      color: var(--red);
    }

    /* ── HEADER ── */
    #dashboard-screen { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left .logo { font-size: 22px; }
    .header-left h1 { font-size: 16px; font-weight: 700; color: var(--gold); }
    .header-right { display: flex; align-items: center; gap: 16px; }

    .logged-in-as { font-size: 13px; color: var(--text-dim); }
    .logged-in-as strong { color: var(--text); }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    main { padding: 28px; max-width: 1280px; margin: 0 auto; }

    /* ── STATS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 18px;
    }

    .stat-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .stat-card .icon { font-size: 20px; float: right; margin-top: -4px; opacity: 0.6; }
    .stat-card .value { font-size: 32px; font-weight: 700; line-height: 1; }
    .stat-card.gold .value  { color: var(--gold); }
    .stat-card.green .value { color: var(--green); }
    .stat-card.blue .value  { color: var(--blue); }
    .stat-card.dim .value   { color: var(--text); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── TABLE CARD ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .table-toolbar {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-toolbar h2 { font-size: 15px; font-weight: 600; }
    .table-toolbar .count { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .toolbar-actions { display: flex; gap: 8px; }

    .btn-sm {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .btn-sm:hover { border-color: var(--gold); color: var(--gold); }

    .btn-sm.btn-create {
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-sm.btn-create:hover { background: var(--gold); color: #0d0d18; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 10px 16px; vertical-align: middle; }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 13px;
      background: var(--surface2);
      color: var(--text-dim);
    }

    .rank-badge.top1 { background: #c9a22722; color: var(--gold); }
    .rank-badge.top2 { background: #c0c0c022; color: #c0c0c0; }
    .rank-badge.top3 { background: #cd7f3222; color: #cd7f32; }

    .score-val { font-weight: 700; color: var(--gold); }
    .wave-val  { color: var(--blue); }
    .gold-val  { color: #f0c050; }
    .smash-val { color: var(--red); }

    .btn-edit {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 5px;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-edit:hover { border-color: var(--blue); color: var(--blue); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-dim); }
    .loading { text-align: center; padding: 32px; color: var(--text-dim); font-size: 13px; }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 { font-size: 16px; font-weight: 700; }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.2s;
    }

    .modal-close:hover { color: var(--text); }

    #modal-fields { padding: 20px 24px 4px; }

    .modal-error {
      margin: 0 24px 12px;
      font-size: 13px;
      color: var(--red);
      min-height: 18px;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 12px 24px 20px;
      border-top: 1px solid var(--border);
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .btn-cancel:hover { border-color: var(--text-dim); }

    .btn-save {
      background: var(--gold);
      border: none;
      color: #0d0d18;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-save:hover { background: #e0b72c; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- ── AUTH ──────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="crest">⚔️</div>
    <h1>Regal Rust</h1>
    <p>Admin Dashboard</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login-btn" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register-btn" onclick="switchAuthTab('register')">Register</button>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <form id="register-form" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="Choose a username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Choose a password" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>

    <div id="login-error"></div>
  </div>
</div>

<!-- ── DASHBOARD ──────────────────────────────────────────────────── -->
<div id="dashboard-screen">
  <header>
    <div class="header-left">
      <span class="logo">⚔️</span>
      <h1>Regal Rust Admin</h1>
    </div>
    <div class="header-right">
      <span class="logged-in-as">Signed in as <strong id="current-username">—</strong></span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card gold">
        <div class="label"><span class="icon">👥</span>Total Players</div>
        <div class="value" id="stat-players">—</div>
      </div>
      <div class="stat-card blue">
        <div class="label"><span class="icon">🏆</span>Total Runs</div>
        <div class="value" id="stat-scores">—</div>
      </div>
      <div class="stat-card green">
        <div class="label"><span class="icon">🎮</span>Active Sessions</div>
        <div class="value" id="stat-active">—</div>
      </div>
      <div class="stat-card dim">
        <div class="label"><span class="icon">✅</span>Completed</div>
        <div class="value" id="stat-completed">—</div>
      </div>
      <div class="stat-card gold">
        <div class="label"><span class="icon">⭐</span>Top Score</div>
        <div class="value" id="stat-top">—</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('leaderboard', this)">🏆 Leaderboard</button>
      <button class="tab-btn" onclick="switchTab('players', this)">👥 Players</button>
      <button class="tab-btn" onclick="switchTab('scores', this)">📊 All Scores</button>
    </div>

    <!-- Leaderboard Tab -->
    <div class="tab-panel active" id="tab-leaderboard">
      <div class="table-wrap">
        <div class="table-toolbar">
          <div>
            <h2>Global Leaderboard</h2>
            <div class="count" id="leaderboard-count"></div>
          </div>
          <div class="toolbar-actions">
            <button class="btn-sm" onclick="loadLeaderboard()">↻ Refresh</button>
          </div>
        </div>
        <div id="leaderboard-body"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <!-- Players Tab -->
    <div class="tab-panel" id="tab-players">
      <div class="table-wrap">
        <div class="table-toolbar">
          <div>
            <h2>All Players</h2>
            <div class="count" id="players-count"></div>
          </div>
          <div class="toolbar-actions">
            <button class="btn-sm btn-create" onclick="openCreatePlayerModal()">+ Create Player</button>
            <button class="btn-sm" onclick="loadPlayers()">↻ Refresh</button>
          </div>
        </div>
        <div id="players-body"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <!-- Scores Tab -->
    <div class="tab-panel" id="tab-scores">
      <div class="table-wrap">
        <div class="table-toolbar">
          <div>
            <h2>All Scores</h2>
            <div class="count" id="scores-count"></div>
          </div>
          <div class="toolbar-actions">
            <button class="btn-sm" onclick="loadScores()">↻ Refresh</button>
          </div>
        </div>
        <div id="scores-body"><div class="loading">Loading...</div></div>
      </div>
    </div>
  </main>
</div>

<!-- ── MODAL ──────────────────────────────────────────────────────── -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="modal">
    <div class="modal-header">
      <h3 id="modal-title">Edit</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <form id="modal-form" onsubmit="handleModalSubmit(event)">
      <div id="modal-fields"></div>
      <div class="modal-error" id="modal-error"></div>
      <div class="modal-footer">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-save" id="modal-save">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
  const API = '';
  let token = localStorage.getItem('rr_token');
  let modalSubmitFn = null;

  if (token) showDashboard();

  // ── AUTH TAB ───────────────────────────────────────────────────────
  function switchAuthTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('login-form').style.display    = isLogin ? '' : 'none';
    document.getElementById('register-form').style.display = isLogin ? 'none' : '';
    document.getElementById('tab-login-btn').classList.toggle('active', isLogin);
    document.getElementById('tab-register-btn').classList.toggle('active', !isLogin);
    document.getElementById('login-error').textContent = '';
  }

  // ── LOGIN ──────────────────────────────────────────────────────────
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username, password }),
      });
      if (!res.ok) {
        errEl.textContent = (await res.json().catch(() => ({}))).detail || 'Invalid credentials.';
        return;
      }
      const data = await res.json();
      token = data.access_token;
      localStorage.setItem('rr_token', token);
      document.getElementById('current-username').textContent = username;
      showDashboard();
    } catch {
      errEl.textContent = 'Could not connect to the server.';
    }
  });

  // ── REGISTER ──────────────────────────────────────────────────────
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    const username = document.getElementById('reg-username').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password }),
      });
      if (!res.ok) {
        errEl.textContent = (await res.json().catch(() => ({}))).detail || 'Registration failed.';
        return;
      }
      const loginRes = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username, password }),
      });
      if (!loginRes.ok) {
        errEl.style.color = 'var(--green)';
        errEl.textContent = 'Account created! Please sign in.';
        switchAuthTab('login');
        return;
      }
      const data = await loginRes.json();
      token = data.access_token;
      localStorage.setItem('rr_token', token);
      document.getElementById('current-username').textContent = username;
      showDashboard();
    } catch {
      errEl.textContent = 'Could not connect to the server.';
    }
  });

  // ── DASHBOARD INIT ─────────────────────────────────────────────────
  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    loadStats();
    loadLeaderboard();
    fetchMe();
  }

  async function fetchMe() {
    try {
      const res = await apiFetch('/auth/me');
      if (res.ok) {
        const d = await res.json();
        document.getElementById('current-username').textContent = d.username;
      }
    } catch {}
  }

  function logout() {
    localStorage.removeItem('rr_token');
    token = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard-screen').style.display = 'none';
    document.getElementById('login-error').textContent = '';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  }

  // ── API HELPER ─────────────────────────────────────────────────────
  function apiFetch(path, opts = {}) {
    return fetch(`${API}${path}`, {
      ...opts,
      headers: { 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) },
    });
  }

  // ── STATS ──────────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const res = await apiFetch('/admin/stats');
      if (!res.ok) return;
      const d = await res.json();
      document.getElementById('stat-players').textContent   = d.total_players.toLocaleString();
      document.getElementById('stat-scores').textContent    = d.total_scores.toLocaleString();
      document.getElementById('stat-active').textContent    = d.active_sessions.toLocaleString();
      document.getElementById('stat-completed').textContent = d.completed_sessions.toLocaleString();
      document.getElementById('stat-top').textContent       = d.top_score.toLocaleString();
    } catch {}
  }

  // ── LEADERBOARD ────────────────────────────────────────────────────
  async function loadLeaderboard() {
    const el = document.getElementById('leaderboard-body');
    el.innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res = await apiFetch('/leaderboard?limit=100');
      if (!res.ok) { el.innerHTML = '<div class="empty-state">Failed to load.</div>'; return; }
      const rows = await res.json();
      document.getElementById('leaderboard-count').textContent = `${rows.length} entries`;
      if (!rows.length) { el.innerHTML = '<div class="empty-state">No scores yet.</div>'; return; }
      el.innerHTML = `
        <table>
          <thead><tr>
            <th>Rank</th><th>Player</th><th>Score</th>
            <th>Gold</th><th>Enemies</th><th>Wave</th><th>Date</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td><span class="rank-badge ${rankClass(r.rank)}">${r.rank}</span></td>
              <td>${escHtml(r.username)}</td>
              <td class="score-val">${r.score.toLocaleString()}</td>
              <td class="gold-val">${r.gold_collected.toLocaleString()}</td>
              <td class="smash-val">${r.enemies_smashed.toLocaleString()}</td>
              <td class="wave-val">${r.wave_reached}</td>
              <td style="color:var(--text-dim)">${fmtDate(r.created_at)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } catch { el.innerHTML = '<div class="empty-state">Error loading leaderboard.</div>'; }
  }

  // ── PLAYERS ────────────────────────────────────────────────────────
  async function loadPlayers() {
    const el = document.getElementById('players-body');
    el.innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res = await apiFetch('/admin/players');
      if (!res.ok) { el.innerHTML = '<div class="empty-state">Failed to load.</div>'; return; }
      const players = await res.json();
      document.getElementById('players-count').textContent = `${players.length} players`;
      if (!players.length) { el.innerHTML = '<div class="empty-state">No players yet.</div>'; return; }
      el.innerHTML = `
        <table>
          <thead><tr>
            <th>#</th><th>Username</th><th>Email</th>
            <th>Sessions</th><th>Joined</th><th>Last Seen</th><th></th>
          </tr></thead>
          <tbody>
            ${players.map(p => `<tr>
              <td style="color:var(--text-dim)">${p.id}</td>
              <td><strong>${escHtml(p.username)}</strong></td>
              <td style="color:var(--text-dim)">${escHtml(p.email)}</td>
              <td>${p.total_sessions}</td>
              <td style="color:var(--text-dim)">${fmtDate(p.created_at)}</td>
              <td style="color:var(--text-dim)">${fmtDate(p.last_seen_at)}</td>
              <td><button class="btn-edit" onclick='openEditPlayerModal(${JSON.stringify(p)})'>Edit</button></td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } catch { el.innerHTML = '<div class="empty-state">Error loading players.</div>'; }
  }

  // ── SCORES ─────────────────────────────────────────────────────────
  async function loadScores() {
    const el = document.getElementById('scores-body');
    el.innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res = await apiFetch('/admin/scores');
      if (!res.ok) { el.innerHTML = '<div class="empty-state">Failed to load.</div>'; return; }
      const scores = await res.json();
      document.getElementById('scores-count').textContent = `${scores.length} records`;
      if (!scores.length) { el.innerHTML = '<div class="empty-state">No scores yet.</div>'; return; }
      el.innerHTML = `
        <table>
          <thead><tr>
            <th>ID</th><th>Player</th><th>Score</th>
            <th>Gold</th><th>Enemies</th><th>Wave</th><th>Date</th><th></th>
          </tr></thead>
          <tbody>
            ${scores.map(s => `<tr>
              <td style="color:var(--text-dim)">${s.id}</td>
              <td>${escHtml(s.username)}</td>
              <td class="score-val">${s.score.toLocaleString()}</td>
              <td class="gold-val">${s.gold_collected.toLocaleString()}</td>
              <td class="smash-val">${s.enemies_smashed.toLocaleString()}</td>
              <td class="wave-val">${s.wave_reached}</td>
              <td style="color:var(--text-dim)">${fmtDate(s.created_at)}</td>
              <td><button class="btn-edit" onclick='openEditScoreModal(${JSON.stringify(s)})'>Edit</button></td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } catch { el.innerHTML = '<div class="empty-state">Error loading scores.</div>'; }
  }

  // ── TABS ───────────────────────────────────────────────────────────
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
    if (name === 'leaderboard') loadLeaderboard();
    if (name === 'players') loadPlayers();
    if (name === 'scores') loadScores();
  }

  // ── MODAL CORE ─────────────────────────────────────────────────────
  function openModal(title, fieldsHtml, onSubmit) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-fields').innerHTML  = fieldsHtml;
    document.getElementById('modal-error').textContent = '';
    document.getElementById('modal-save').disabled = false;
    modalSubmitFn = onSubmit;
    document.getElementById('modal-overlay').classList.add('open');
    // focus first input
    const first = document.querySelector('#modal-fields input');
    if (first) setTimeout(() => first.focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    modalSubmitFn = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  async function handleModalSubmit(e) {
    e.preventDefault();
    if (!modalSubmitFn) return;
    const saveBtn = document.getElementById('modal-save');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    try {
      await modalSubmitFn();
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save';
    }
  }

  function modalError(msg) {
    document.getElementById('modal-error').textContent = msg;
  }

  // ── CREATE PLAYER MODAL ────────────────────────────────────────────
  function openCreatePlayerModal() {
    openModal('Create Player', `
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="m-username" placeholder="Username" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="m-email" placeholder="Email" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="m-password" placeholder="Password" required />
      </div>`,
      async () => {
        const username = document.getElementById('m-username').value.trim();
        const email    = document.getElementById('m-email').value.trim();
        const password = document.getElementById('m-password').value;
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        if (!res.ok) { modalError((await res.json().catch(() => ({}))).detail || 'Failed.'); return; }
        closeModal();
        loadPlayers();
        loadStats();
      }
    );
  }

  // ── EDIT PLAYER MODAL ──────────────────────────────────────────────
  function openEditPlayerModal(player) {
    openModal(`Edit Player — ${player.username}`, `
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="m-username" value="${escAttr(player.username)}" placeholder="Username" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="m-email" value="${escAttr(player.email)}" placeholder="Email" />
      </div>`,
      async () => {
        const username = document.getElementById('m-username').value.trim();
        const email    = document.getElementById('m-email').value.trim();
        const body = {};
        if (username !== player.username) body.username = username;
        if (email    !== player.email)    body.email    = email;
        if (!Object.keys(body).length) { closeModal(); return; }
        const res = await apiFetch(`/admin/players/${player.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) { modalError((await res.json().catch(() => ({}))).detail || 'Failed.'); return; }
        closeModal();
        loadPlayers();
      }
    );
  }

  // ── EDIT SCORE MODAL ───────────────────────────────────────────────
  function openEditScoreModal(score) {
    openModal(`Edit Score #${score.id} — ${score.username}`, `
      <div class="form-group">
        <label>Score</label>
        <input type="number" id="m-score" value="${score.score}" min="0" required />
      </div>
      <div class="form-group">
        <label>Gold Collected</label>
        <input type="number" id="m-gold" value="${score.gold_collected}" min="0" />
      </div>
      <div class="form-group">
        <label>Enemies Smashed</label>
        <input type="number" id="m-enemies" value="${score.enemies_smashed}" min="0" />
      </div>
      <div class="form-group">
        <label>Wave Reached</label>
        <input type="number" id="m-wave" value="${score.wave_reached}" min="0" />
      </div>`,
      async () => {
        const body = {
          score:           parseInt(document.getElementById('m-score').value),
          gold_collected:  parseInt(document.getElementById('m-gold').value),
          enemies_smashed: parseInt(document.getElementById('m-enemies').value),
          wave_reached:    parseInt(document.getElementById('m-wave').value),
        };
        const res = await apiFetch(`/admin/scores/${score.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) { modalError((await res.json().catch(() => ({}))).detail || 'Failed.'); return; }
        closeModal();
        loadScores();
        loadLeaderboard();
        loadStats();
      }
    );
  }

  // ── UTILS ──────────────────────────────────────────────────────────
  function rankClass(r) {
    if (r === 1) return 'top1';
    if (r === 2) return 'top2';
    if (r === 3) return 'top3';
    return '';
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function escAttr(str) { return escHtml(str); }
</script>
</body>
</html>
